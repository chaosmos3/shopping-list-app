<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .app {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 480px;
      height: fit-content;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      padding: 28px 24px 20px;
    }

    .header h1 { font-size: 1.6rem; font-weight: 700; }
    .header .count { font-size: 0.85rem; opacity: 0.8; margin-top: 4px; }

    .input-area {
      display: flex;
      gap: 8px;
      padding: 20px 20px 12px;
      border-bottom: 1px solid #eee;
    }

    .input-area input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-area input:focus { border-color: #667eea; }

    .input-area button {
      padding: 10px 18px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .input-area button:hover { background: #5a6fd6; }
    .input-area button:disabled { background: #aaa; cursor: default; }

    .filter-bar {
      display: flex;
      gap: 6px;
      padding: 12px 20px;
      border-bottom: 1px solid #eee;
    }

    .filter-bar button {
      padding: 5px 14px;
      border: 1.5px solid #ddd;
      border-radius: 20px;
      background: transparent;
      font-size: 0.82rem;
      cursor: pointer;
      color: #666;
      transition: all 0.2s;
    }

    .filter-bar button.active {
      background: #667eea;
      border-color: #667eea;
      color: #fff;
    }

    .list { padding: 8px 0; min-height: 80px; }

    .empty {
      text-align: center;
      color: #aaa;
      font-size: 0.9rem;
      padding: 40px 0;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      border-bottom: 1px solid #f5f5f5;
      transition: background 0.15s;
      animation: fadeIn 0.2s ease;
    }

    .item:hover { background: #fafafa; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #667eea;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 0.95rem;
      color: #333;
      transition: all 0.2s;
      word-break: break-all;
    }

    .item.checked .item-text {
      text-decoration: line-through;
      color: #aaa;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      line-height: 1;
      transition: color 0.2s, background 0.2s;
    }

    .delete-btn:hover { color: #e53e3e; background: #fff5f5; }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      border-top: 1px solid #eee;
      font-size: 0.82rem;
      color: #999;
    }

    .footer button {
      background: none;
      border: none;
      color: #e53e3e;
      font-size: 0.82rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 0.2s;
    }

    .footer button:hover { background: #fff5f5; }
    .footer button:disabled { color: #ccc; cursor: default; }
    .footer button:disabled:hover { background: transparent; }

    .status-bar {
      text-align: center;
      font-size: 0.75rem;
      color: #999;
      padding: 6px 20px;
      background: #f9f9f9;
      border-top: 1px solid #eee;
    }

    .status-bar.error { color: #e53e3e; }
    .status-bar.loading { color: #667eea; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>쇼핑 리스트</h1>
    <div class="count" id="count">0개 항목</div>
  </div>

  <div class="input-area">
    <input type="text" id="newItem" placeholder="아이템 추가..." maxlength="80">
    <button id="addBtn" onclick="addItem()">+</button>
  </div>

  <div class="filter-bar">
    <button class="active" onclick="setFilter('all', this)">전체</button>
    <button onclick="setFilter('active', this)">미완료</button>
    <button onclick="setFilter('done', this)">완료</button>
  </div>

  <div class="list" id="list"></div>

  <div class="footer">
    <span id="remaining"></span>
    <button id="clearBtn" onclick="clearDone()">완료 항목 삭제</button>
  </div>
  <div class="status-bar loading" id="statusBar">Supabase 연결 중...</div>
</div>

<script>
  const SUPABASE_URL = 'https://ysuckcrizrwzsknagnjz.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzdWNrY3JpenJ3enNrbmFnbmp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwOTc4MjAsImV4cCI6MjA5MjY3MzgyMH0.Z3YR1GPId5oM76KBlfcTL0aR5T7fUVHyQBM5alN1j6c';

  const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let items = [];
  let filter = 'all';

  function setStatus(msg, type = '') {
    const bar = document.getElementById('statusBar');
    bar.textContent = msg;
    bar.className = 'status-bar' + (type ? ' ' + type : '');
  }

  function setLoading(on) {
    document.getElementById('addBtn').disabled = on;
  }

  async function loadItems() {
    setStatus('데이터 로딩 중...', 'loading');

    // localStorage 데이터 마이그레이션 (최초 1회)
    const localData = JSON.parse(localStorage.getItem('shopping') || '[]');

    const { data, error } = await db
      .from('shopping_items')
      .select('*')
      .order('id', { ascending: false });

    if (error) {
      setStatus('로드 실패: ' + error.message, 'error');
      return;
    }

    if (localData.length > 0 && data.length === 0) {
      setStatus('로컬 데이터 마이그레이션 중...', 'loading');
      const { error: insertError } = await db.from('shopping_items').insert(localData);
      if (!insertError) {
        localStorage.removeItem('shopping');
        const { data: migrated } = await db
          .from('shopping_items')
          .select('*')
          .order('id', { ascending: false });
        items = migrated || [];
        setStatus('마이그레이션 완료 ✓ Supabase 연결됨');
      } else {
        items = data;
        setStatus('Supabase 연결됨');
      }
    } else {
      items = data;
      setStatus('Supabase 연결됨');
    }

    render();
  }

  function render() {
    const list = document.getElementById('list');
    const filtered = items.filter(item =>
      filter === 'all' ? true :
      filter === 'active' ? !item.done :
      item.done
    );

    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty">항목이 없습니다</div>';
    } else {
      list.innerHTML = filtered.map(item => `
        <div class="item ${item.done ? 'checked' : ''}" id="item-${item.id}">
          <input type="checkbox" ${item.done ? 'checked' : ''} onchange="toggle(${item.id})">
          <span class="item-text">${escHtml(item.text)}</span>
          <button class="delete-btn" onclick="remove(${item.id})" title="삭제">&#x2715;</button>
        </div>
      `).join('');
    }

    const total = items.length;
    const done = items.filter(i => i.done).length;
    const active = total - done;

    document.getElementById('count').textContent = `${total}개 항목`;
    document.getElementById('remaining').textContent = `미완료 ${active}개`;
    document.getElementById('clearBtn').disabled = done === 0;
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  async function addItem() {
    const input = document.getElementById('newItem');
    const text = input.value.trim();
    if (!text) return;

    const newItem = { id: Date.now(), text, done: false };
    input.value = '';
    setLoading(true);

    const { error } = await db.from('shopping_items').insert([newItem]);
    if (error) {
      setStatus('추가 실패: ' + error.message, 'error');
    } else {
      items.unshift(newItem);
      setStatus('Supabase 연결됨');
      render();
    }
    setLoading(false);
    input.focus();
  }

  async function toggle(id) {
    const item = items.find(i => i.id === id);
    if (!item) return;

    const { error } = await db.from('shopping_items').update({ done: !item.done }).eq('id', id);
    if (error) {
      setStatus('수정 실패: ' + error.message, 'error');
    } else {
      item.done = !item.done;
      render();
    }
  }

  async function remove(id) {
    const { error } = await db.from('shopping_items').delete().eq('id', id);
    if (error) {
      setStatus('삭제 실패: ' + error.message, 'error');
    } else {
      items = items.filter(i => i.id !== id);
      render();
    }
  }

  async function clearDone() {
    setLoading(true);
    const { error } = await db.from('shopping_items').delete().eq('done', true);
    if (error) {
      setStatus('삭제 실패: ' + error.message, 'error');
    } else {
      items = items.filter(i => !i.done);
      render();
    }
    setLoading(false);
  }

  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.filter-bar button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  document.getElementById('newItem').addEventListener('keydown', e => {
    if (e.key === 'Enter') addItem();
  });

  loadItems();
</script>
</body>
</html>
